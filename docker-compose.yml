services:
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${SERVICE_USER_MONGODB:-tabletop}
      MONGO_INITDB_ROOT_PASSWORD: ${SERVICE_PASSWORD_MONGODB:-tabletop_pass}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://${SERVICE_USER_MONGODB:-tabletop}:${SERVICE_PASSWORD_MONGODB:-tabletop_pass}@mongodb:27017/tabletop?authSource=admin
      - NEXTAUTH_SECRET=${SERVICE_PASSWORD_64_NEXTAUTH:-default_nextauth_secret_change_me}
      - NEXTAUTH_URL=${http://localhost:3000}
      - CSRF_SECRET=${SERVICE_PASSWORD_64_CSRF:-default_csrf_secret_change_me}
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
